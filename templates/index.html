    "Bonus: 🕯️ 心愿加持 | 加成：🕯️ Wish-blessing applied",
    "Bonus: 📈 人气+10 | 加成：📈 Popularity +10",
    "Bonus: 🍵 静心茶 buff | 加成：🍵 Calming-tea buff",
    "Bonus: 🧨 好运炸开 | 加成：🧨 Luck burst",
    "Bonus: 🪙 偏财运+10 | 加成：🪙 Extra windfall +10",
    "Bonus: 🌤️ 心情晴朗 | 加成：🌤️ Bright mood",
    "Bonus: 🎊 全场最佳 buff | 加成：🎊 MVP-of-the-day buff",
    "Bonus: 🧿 护身符启动 | 加成：🧿 Amulet activated"
  ];

  const CLOSING_LINES = [
    "恭喜发财，万事如意! | Gong Xi Fa Cai, all the best!",
    "新年快乐，平安顺遂! | Happy New Year, peace & smooth days!",
    "身体健康，笑口常开! | Good health and lots of smiles!",
    "福气满满，天天好运! | Blessings & daily luck!",
    "心想事成，事事顺心! | May wishes come true!",
    "财运滚滚来! | Wealth rolling in!",
    "好运开局，全年旺! | Strong start, prosperous year!",
    "少烦恼，多开心! | Less stress, more joy!",
    "贵人多多，机会多多! | More helpers, more opportunities!",
    "开工大吉! | Great start to work!",
    "岁岁平安，年年有余! | Peace every year, abundance every year!",
    "心想事成，步步高升! | May wishes come true, step by step higher!",
    "龙马精神，活力满满! | Vigorous spirit, full of energy!",
    "招财进宝，年年好运! | Wealth and treasures, year after year!",
    "喜气洋洋，好运常在! | Joyful spirits, luck that stays!",
    "万事顺意，心想事成! | Everything goes your way!",
    "财源广进，步步高! | Wealth flows in, rising step by step!",
    "阖家欢乐，幸福美满! | Family joy and happiness!",
    "生意兴隆，通四海! | Business thrives far and wide!",
    "好运连连，笑口常开! | Good luck keeps coming, keep smiling!"
  ];

  const AMOUNT_POOL = (
    Array(10).fill("🧧") .concat(
    Array(8).fill("🧧🧧"),
    Array(6).fill("🧧🧧🧧"),
    Array(4).fill("🧧🧧🧧🧧"),
    Array(2).fill("🧧🧧🧧🧧🧧"),
    Array(1).fill("🧧🧧🧧🧧🧧🧧")
  ));

  const BURST_CONFIG = {
    normal:  { burstCount: 12, burstSpread: 90,  burstDuration: 800,  rainCount: 18, rainDuration: 1400, particles: ["🪙"] },
    high:    { burstCount: 20, burstSpread: 120, burstDuration: 1000, rainCount: 34, rainDuration: 1800, particles: ["🪙", "✨"] },
    jackpot: { burstCount: 30, burstSpread: 170, burstDuration: 1200, rainCount: 60, rainDuration: 2400, particles: ["🪙", "✨", "🐉"] }
  };

  // ---------------------------------------------------------------------
  // Helpers
  // ---------------------------------------------------------------------
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
  function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  // ---------------------------------------------------------------------
  // Main "shake" flow
  // ---------------------------------------------------------------------
  const shakeBtn = document.getElementById("shake-btn");
  const teaseEl = document.getElementById("tease");
  const successEl = document.getElementById("success-msg");
  const stageEl = document.getElementById("rp-stage");

  shakeBtn.addEventListener("click", function () {
    shakeBtn.disabled = true;
    successEl.style.display = "none";
    stageEl.innerHTML = "";
    teaseEl.textContent = pick(TEASE_LINES);

    const delay = pick([900, 1100, 1200, 1400]);
    setTimeout(revealResult, delay);
  });

  function revealResult() {
    teaseEl.textContent = "";
    shakeBtn.disabled = false;

    const nameInput = document.getElementById("name-input").value.trim();
    const safeName = (nameInput ? nameInput : "YOU").slice(0, 18);

    const amount = pick(AMOUNT_POOL);

    let [luckZh, luckEn] = pick(LUCK_PAIRS);
    if (Math.random() < 0.6) {
      const [flourishZh, flourishEn] = pick(FLOURISHES);
      luckZh = `${flourishZh}${luckZh}`;
      luckEn = `${flourishEn} ${luckEn}`;
    }
    const luck = `${luckZh} | ${luckEn}`;

    const persona = pick(PERSONAS);
    const keyword = pick(KEYWORDS);

    let fortuneScore = randInt(68, 99);
    if (Math.random() < 0.06) fortuneScore = 100;

    const bonus = pick(BONUSES);
    const showBonus = Math.random() < 0.55;
    const isJackpot = Math.random() < 0.01;

    let tier = "normal";
    if (isJackpot) tier = "jackpot";
    else if (fortuneScore >= 90) tier = "high";
    const burst = BURST_CONFIG[tier];

    successEl.style.display = "block";

    const bonusLine = showBonus ? bonus : "Bonus: ✨ Hidden this round | 加成：✨ 本轮隐藏";
    const jackpotBanner = isJackpot
      ? `<div class="jackpot-banner">🐉 JACKPOT! 龙运爆发 • Legendary Luck!</div>`
      : "";

    const cardHtml = `
      <div id="rp-card" class="${isJackpot ? 'jackpot' : ''}">
        <div class="watermark">福</div>
        <div class="title-row">
          <div class="icon">🧧</div>
          <div class="title">${CURRENT_YEAR} 新年红包 · ${zodiac} <span style="opacity:0.85;">•</span> New Year Red Packet</div>
        </div>
        ${jackpotBanner}
        <div class="grid">
          <div><b>To / 收件人:</b><br>${escapeHtml(safeName)}</div>
          <div><b>Amount / 红包量:</b><br>${amount}</div>
          <div class="span2"><b>Luck / 运势:</b><br>${escapeHtml(luck)}</div>
          <div class="span2"><b>Persona / 角色:</b><br>${escapeHtml(persona)}</div>
          <div><b>Keyword / 关键词:</b><br>${escapeHtml(keyword)}</div>
          <div><b>Fortune / 好运指数:</b><br>${fortuneScore}/100</div>
        </div>
        <div class="meter-wrap">
          <div class="meter-track"><div class="meter-fill" style="width:${fortuneScore}%;"></div></div>
          <div class="bonus-line">${escapeHtml(bonusLine)}</div>
        </div>
      </div>
      <div class="actions-row">
        <button id="dl-btn">Download image / 下载图片</button>
        <span id="dl-status"></span>
      </div>
    `;
    stageEl.innerHTML = cardHtml;

    runCoinAnimation(stageEl, burst);
    wireDownloadButton();
    renderShareSection(safeName, amount, luck, persona, keyword, fortuneScore, bonusLine, showBonus);
  }

  // ---------------------------------------------------------------------
  // Coin burst + rain animation
  // No iframe involved here, so no height-guessing hacks are needed —
  // it's just normal page flow, and falling coins simply overlay the
  // page beneath the card like any other absolutely-positioned element.
  // ---------------------------------------------------------------------
  function runCoinAnimation(stage, burst) {
    function makeParticle(particles) {
      const token = particles[Math.floor(Math.random() * particles.length)];
      const p = document.createElement("div");
      p.className = "particle";
      p.style.opacity = "1";
      if (token === "🪙") {
        // Drawn with CSS rather than the emoji glyph, since 🪙 renders
        // silver/grey on iOS's built-in emoji font but gold on most
        // desktop browsers — this keeps it gold everywhere.
        const size = 14 + Math.random() * 10;
        p.classList.add("coin-particle");
        p.style.width = size + "px";
        p.style.height = size + "px";
      } else {
        p.textContent = token;
        p.style.fontSize = (14 + Math.random() * 14) + "px";
      }
      return p;
    }

    // Phase 1: quick radial burst from the card center
    for (let i = 0; i < burst.burstCount; i++) {
      const p = makeParticle(burst.particles);
      p.style.left = "50%";
      p.style.top = "30%";
      p.style.transition = `transform ${burst.burstDuration}ms cubic-bezier(.15,.7,.3,1), opacity ${burst.burstDuration}ms ease-out`;
      p.style.transform = "translate(-50%,-50%)";
      stage.appendChild(p);
      const angle = Math.random() * Math.PI * 2;
      const dist = burst.burstSpread * (0.6 + Math.random() * 0.6);
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist * 0.6 + burst.burstSpread * 0.4;
      requestAnimationFrame(() => {
        p.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) rotate(${Math.random() * 360}deg)`;
        p.style.opacity = "0";
      });
      setTimeout(() => p.remove(), burst.burstDuration + 50);
    }

    // Phase 2: a fuller shower of coins raining down, staggered over time
    const cardHeight = stage.querySelector("#rp-card").getBoundingClientRect().height;
    const rainFallY = cardHeight + 40;
    for (let i = 0; i < burst.rainCount; i++) {
      const delay = Math.random() * burst.rainDuration * 0.7;
      setTimeout(() => {
        const p = makeParticle(burst.particles);
        const startX = 5 + Math.random() * 90;
        const fallDuration = burst.rainDuration * (0.5 + Math.random() * 0.5);
        p.style.left = startX + "%";
        p.style.top = "-24px";
        p.style.transition = `top ${fallDuration}ms linear, opacity ${fallDuration}ms ease-in, transform ${fallDuration}ms linear`;
        p.style.transform = "rotate(0deg)";
        stage.appendChild(p);
        requestAnimationFrame(() => {
          p.style.top = rainFallY + "px";
          p.style.transform = `rotate(${(Math.random() * 480) - 240}deg) translateX(${(Math.random() * 40) - 20}px)`;
          p.style.opacity = "0.15";
        });
        setTimeout(() => p.remove(), fallDuration + 60);
      }, delay);
    }
  }

  // ---------------------------------------------------------------------
  // Download image (captures the real card directly, no separate design)
  // ---------------------------------------------------------------------
  function wireDownloadButton() {
    document.getElementById("dl-btn").addEventListener("click", function () {
      const status = document.getElementById("dl-status");
      status.textContent = "Rendering...";
      html2canvas(document.getElementById("rp-card"), { scale: 2, backgroundColor: null }).then(function (canvas) {
        const link = document.createElement("a");
        link.download = `red-packet-${CURRENT_YEAR}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
        status.textContent = "Downloaded";
      }).catch(function () {
        status.textContent = "Could not render image";
      });
    });
  }

  // ---------------------------------------------------------------------
  // Share section: WhatsApp / Email / plain text / closing line
  // ---------------------------------------------------------------------
  function renderShareSection(safeName, amount, luck, persona, keyword, fortuneScore, bonusLine, showBonus) {
    const shareText =
      `🧧 ${CURRENT_YEAR} 新年红包 · ${zodiac} | New Year Red Packet ${CURRENT_YEAR} 🧧\n\n` +
      `To / 收件人: ${safeName}\n` +
      `Amount / 红包量: ${amount}\n` +
      `Luck / 运势: ${luck}\n` +
      `Persona / 角色: ${persona}\n` +
      `Keyword / 关键词: ${keyword}\n` +
      `Fortune Meter / 好运指数: ${fortuneScore}/100\n\n` +
      `${showBonus ? bonusLine : ""}\n\n` +
      "马上HUAT财 😄😄😄😄😄\n";

    const waText = encodeURIComponent(shareText);
    const mailSubject = encodeURIComponent(`🧧 ${CURRENT_YEAR} New Year Red Packet | 新年红包`);
    const mailBody = encodeURIComponent(shareText);
    const closing = pick(CLOSING_LINES);

    const shareHtml = `
      <div class="share-row">
        <a class="share-btn whatsapp" href="https://wa.me/?text=${waText}" target="_blank">📱 Share on WhatsApp</a>
        <a class="share-btn email" href="mailto:?subject=${mailSubject}&body=${mailBody}" target="_blank">✉️ Share via Email</a>
      </div>
      <details>
        <summary>Plain text (copy manually) / 纯文字（手动复制）</summary>
        <div id="plain-text">${escapeHtml(shareText)}</div>
      </details>
      <div id="closing-line">${escapeHtml(closing)}</div>
    `;
    stageEl.insertAdjacentHTML("beforeend", shareHtml);
  }
  </script>

  <div class="tip-footer">
    <div class="msg">
      Enjoyed this? Support is always optional — thanks for playing! 🙏 |
      觉得好玩的话，欢迎随意支持一下（纯自愿）🙏
    </div>
    {% if tip_qr_url %}
      <img src="{{ tip_qr_url }}" alt="Scan to PayNow" style="width:110px;border-radius:8px;">
    {% elif tip_link %}
      <a class="tip-btn" href="{{ tip_link }}" target="_blank">☕ Tip</a>
    {% endif %}
  </div>

</div>
</body>
</html>
